openapi: "3.0.1"
info:
  title: "Machine locations history API"
  description: "Endpoints related to machine locations and location history without considering machine data"
  version: "1.0.0"
servers:
  - url: "https://{environment}.deere.com/platform"
    variables:
      environment:
        default: "api"
        enum:
          - "api"
          - "sandboxapi"
          - "partnerapi"
          - "apicert"
          - "apiqa.tal"
          - "apidev.tal"
          - "partnerapicert"
          - "partnerapiqa"
          - "sandboxapiqa"
paths:
  /machines/{principalId}/breadcrumbs:
    get:
      operationId: "getBreadcrumbsByMachineId"
      summary: "Machine Breadcrumbs"
      description: "This resource allows the client to get the following details of a Machine: SpeedFuel LevelDirection of Machine (heading)Machine StateMachine State Defined Type IdCorrelation IdLocation AltitudeOriginCreated TimeStamp"
      security:
        - OAuth2:
            - "eq1"
      tags:
        - "Breadcrumbs"
      parameters:
        - name: "principalId"
          in: "path"
          description: "principalId of Machine/Equipment."
          x-required-boolean: true
          schema:
            type: "string"
            example: 7099
        - name: "orgId"
          in: "query"
          description: "OrganizationId"
          x-required-boolean: false
          schema:
            type: "string"
            example: 2551
        - name: "startDate"
          in: "query"
          description: "UTC format Start Date.If null, 'current time - 24 hours' will be treated as startDate."
          x-required-boolean: false
          schema:
            type: "string"
            format: "date-time"
            example: "2019-01-16T00:00:00.000Z"
        - name: "endDate"
          in: "query"
          description: "UTC format End Date. If null, current time will be treated as endDate."
          x-required-boolean: false
          schema:
            type: "string"
            format: "date-time"
            example: "2019-01-16T23:59:59.999Z"
        - name: "lastKnown"
          in: "query"
          description: "Default value: false. Valid values: true or false. If true, then date parameters are not used and the last known location of the machine will be sent in the response."
          x-required-boolean: false
          schema:
            type: "boolean"
            default: false
            example: "true"
        - name: "Accept-Language"
          in: "header"
          description: "Accept Language. If not provided, the default Locale is US. Else, Locale will be searched on the basis of language."
          x-required-boolean: false
          schema:
            type: "string"
            example: "true"
            default: "en"
      responses:
        "200":
          description: "Breadcrumb list for the machine"
          content:
            application/vnd.deere.axiom.v3+json:
              schema:
                $ref: "#/components/schemas/Breadcrumbs_Response"
              examples:
                No Header:
                  description: "200 OK Content-Type: application/vnd.deere.axiom.v3+json"
                  value:
                    links:
                      - rel: "self"
                        uri: "https://sandboxapi.deere.com/platform/machines/7099/breadcrumbs?lastKnown=true"
                    total: 1
                    values:
                      - "@type": "Breadcrumb"
                        createTimestamp: "2018-12-18T08:30:03.789Z"
                        speed:
                          "@type": "measurementAsDouble"
                          valueAsDouble: 35
                          unit: "km1hr-1"
                        heading:
                          "@type": "measurementAsInteger"
                          valueAsInteger: "33"
                        machineState:
                          "@type": "Breadcrumb$MachineState"
                          rawState: 1
                        fuelLevel:
                          "@type": "measurementAsDouble"
                          valueAsDouble: 19
                          unit: "prcnt"
                        principalId:
                          description: "Principal/Equipment id of which the location corresponds to."
                          type: "integer"
                          example: 123456
                        origin: "BREADCRUMB"
                        correlationId: "1162b8ad-bbca-4c91-8c0e-2f2794b250a1"
                        point:
                          "@type": "Point"
                          lat: 18.513935
                          lon: 73.927629
                          altitude:
                            "@type": "measurementAsDouble"
                            valueAsDouble: 0
                            unit: "m"
                        eventTimestamp: "2018-11-18T08:40:51.000Z"
                        links:
                          - "@type": "Link"
                            rel: "machine"
                            uri: "https://sandboxapi.deere.com/platform/machines/7099"
        "403":
          description: "The user does not have access to the machine or is not allowed to see machine locations"
        "404":
          description: "Machine not found"
  /machines/{principalId}/locationHistory:
    get:
      tags:
        - "Alpha"
      description: "The machine location service allows the client to view a list of location reports for a machine.A location report will include the machine's longitude, latitude, and altitude.For each location report, the response will link to the /machines resource."
      summary: "Machine Location History"
      security:
        - OAuth2:
            - "eq1"
      parameters:
        - name: "principalId"
          in: "path"
          description: "Principal Id of Machine/Equipment."
          x-required-boolean: true
          schema:
            type: "string"
            default: "N/A"
            example: 5432
            format: "int64"
        - name: "lastKnown"
          in: "query"
          description: "Includes the last known machine location."
          schema:
            type: "boolean"
            default: "N/A"
            example: "false"
        - name: "startDate"
          in: "query"
          description: "Retrieves results that occurred after a specified date.If start date is not passedin the API request then start Date is considered as end date minus 1 day. The format is in the Standard."
          schema:
            type: "string"
            format: "date"
            default: "N/A"
            example: "2010-10-04T14:35:05.000Z"
        - name: "endDate"
          in: "query"
          description: "Retrieves results that occurred before a specified date. If end date is not passed in the API requestthen end Date is considered as start date plus 1 day. The format is in the Standard.Also startDate and endDate time interval range should be =1 month.Example if startDate=2020-10-01T00:00:00.000Z endDate should be =2010-10-31T23:59:59.000Z"
          schema:
            type: "string"
            format: "date"
            default: "N/A"
            example: "2010-10-04T14:38:35.000Z"
      responses:
        "200":
          description: "Location list for the machine"
          content:
            application/vnd.deere.axiom.v3+json:
              schema:
                type: "object"
                properties:
                  links:
                    type: "array"
                    description: "Link list"
                    items:
                      $ref: "#/components/schemas/MyJD_links"
                  total:
                    type: "integer"
                    description: "Number of results in the list"
                  values:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/ReportedLocation"
              examples:
                No Header:
                  description: "200 OK Content-Type: application/vnd.deere.axiom.v3+json"
                  value:
                    links:
                      - rel: "self"
                        uri: "https://sandboxapi.deere.com/platform/machines/4321/locationHistory"
                    total: 2
                    values:
                      - point:
                          lat: 41.597164
                          lon: -90.54383
                          altitude:
                            "@type": "measurementAsDouble"
                            valueAsDouble: 0
                            links: null
                            unit: "meters"
                          links: null
                        eventTimestamp: "2010-10-20T22:32:16.000Z"
                        gpsFixTimestamp: "1970-01-01T00:00:00.000Z"
                        links:
                          - rel: "machine"
                            uri: "https://sandboxapi.deere.com/platform/machines/4321"
                      - point:
                          lat: 41.597305
                          lon: -90.543884
                          altitude:
                            "@type": "measurementAsDouble"
                            valueAsDouble: 0
                            links: null
                            unit: "meters"
                          links: null
                        eventTimestamp: "2010-10-04T15:06:34.000Z"
                        gpsFixTimestamp: "2010-10-04T15:06:24.000Z"
                        links:
                          - rel: "machine"
                            uri: "https://sandboxapi.deere.com/platform/machines/4321"
        "403":
          description: "The user does not have access to the machine or is not allowed to see mahcine locations"
          content: {}
        "404":
          description: "Machine not found"
          content: {}
components:
  schemas:
    Breadcrumb:
      description: "Breadcrumb object containing location information and location-relevant machine data."
      type: "object"
      allOf:
        - $ref: "#/components/schemas/Breadcrumb_POST"
      properties:
        machineState:
          $ref: "#/components/schemas/BreadcrumbMachineState"
        origin:
          x-required-boolean: true
          type: "string"
          description: "The origin of the breadcrumb"
          enum:
            - "JDLINK"
            - "BREADCRUMB"
          default: "BREADCRUMB"
          example: "BREADCRUMB"
        links:
          x-required-boolean: true
          type: "array"
          items:
            type: "object"
            allOf:
              - $ref: "#/components/schemas/Breadcrumb_links"
    BreadcrumbMachineState:
      description: "Human readable title for the machine state"
      type: "object"
      properties:
        "@type":
          type: "string"
          default: "Breadcrumb$MachineState"
          example: "Breadcrumb$MachineState"
        value:
          type: "string"
          enum:
            - "Idle"
            - "Working"
            - "Transporting"
          example: "Idle"
    Breadcrumb_POST:
      description: "Breadcrumb object containing location information and location-relevant machine data."
      type: "object"
      required:
        - "@type"
        - "createTimestamp"
        - "eventTimestamp"
        - "point"
        - "links"
      properties:
        "@type":
          description: "Object type"
          type: "string"
          default: "Breadcrumb"
          example: "Breadcrumb"
        createTimestamp:
          description: "The timestamp of the breadcrumb creation"
          type: "string"
          format: "date-time"
          example: "2018-08-07T10:12:50.911Z"
        eventTimestamp:
          description: "The timestamp of the event when the position was changed"
          type: "string"
          format: "date-time"
          example: "2018-08-07T10:12:50.911Z"
        point:
          $ref: "#/components/schemas/Point"
        speed:
          $ref: "#/components/schemas/MeasurementAsDouble"
        heading:
          $ref: "#/components/schemas/MeasurementAsInteger"
        fuelLevel:
          $ref: "#/components/schemas/MeasurementAsDouble"
        principalId:
          description: "Principal/Equipment id of which the location corresponds to."
          type: "integer"
          example: 123456
        correlationId:
          description: "Correlation ID has to be submitted with location or breadcrumb information when uploading to the server. Corellation ID information can be used by clients for diagnostics of the parallel assignment of the same machine to 2 or more devices. Workflow for detection: - My app subscribed to the machine locations changes of my org - If selecting a machine on my mobile device my app checks whether some device sent locations recently which was not mine (not one of my previous or current correlationIDs) - Prevention! - If I detected that another device sent location - the app warns me and I'm able to decide to select the machine or not - I started MLT and my app sends the breadcrumb/location with my correlationID to the server - My app is still subscribed to machine locations changes of the org and receives a location of machine selected in my app with a correlation ID which is not one of mines - My app warns me that another user reports locations to My machine as well - BTW - empty Correlation ID is not allowed when contributing a location or breadcrumb using the API or IoT - Recommendation - the app shall create a new correlationID (guid) when the user selects a new machine Correlation ID can be used for cleaning up recorded locations data on the server side in case the client erroneously submitted location data for a wrong machine."
          type: "string"
          format: "guid"
          example: "c1429d12-17db-4fd5-a27f-50ba62e81c8c"
        links:
          type: "array"
          items:
            type: "object"
            allOf:
              - $ref: "#/components/schemas/Breadcrumb_links"
    Breadcrumb_links:
      description: "Links related to the breadcrumb"
      required:
        - "@type"
        - "rel"
        - "uri"
      properties:
        "@type":
          type: "string"
          default: "Link"
          description: "This is the @type definition for this reference object."
          example: "Link"
        rel:
          type: "string"
          description: "Defines the relation from the object to the link. The minimum response is the self link. Please refere to the individual example and object definition (the allOf keyword which is only visibile in the YAMl code) to see all required links for the instance of the object."
        uri:
          type: "string"
          format: "uri"
          description: "The URL to the ressource which is related"
      example:
        - "@type": "Link"
          rel: "contributionDefinition"
          uri: "https://partnerapi.deere.com/platform/contributionDefinitions/70df8ced-b6df-458e-b6f2-2d705cb9a2bf"
        - "@type": "Link"
          rel: "machine"
          uri: "https://partnerapi.deere.com/platform/machines/482754"
    Breadcrumbs_Response:
      description: "Page of bredacrumb information for the machine"
      type: "object"
      properties:
        links:
          x-required-boolean: true
          description: "Link list"
          type: "array"
          items:
            $ref: "#/components/schemas/MyJD_links_Breadcrumbs"
        total:
          x-required-boolean: true
          description: "Number of results in the list"
          type: "integer"
          example: 1
        values:
          x-required-boolean: true
          type: "array"
          items:
            $ref: "#/components/schemas/Breadcrumb"
    MeasurementAsDouble:
      description: "Measurement as double value"
      type: "object"
      required:
        - "valueAsDouble"
      properties:
        valueAsDouble:
          type: "number"
          format: "float"
        unit:
          type: "string"
        vrDomainId:
          type: "string"
    MeasurementAsInteger:
      description: "Measurement as integer value"
      type: "object"
      required:
        - "valueAsInteger"
      properties:
        valueAsInteger:
          type: "number"
        unit:
          type: "string"
        vrDomainId:
          type: "string"
    MyJD_links:
      properties:
        machine:
          example: "https://sandboxapi.deere.com/platform/machines/4321"
          description: "Machines Link."
    MyJD_links_Breadcrumbs:
      description: "The link object provides links to ressources which are related to the response"
      properties:
        "@type":
          x-required-boolean: true
          type: "string"
          default: "Link"
          description: "This is the @type definition for this reference object."
          example: "Link"
        rel:
          x-required-boolean: true
          type: "string"
          default: "self"
          description: "Defines the relation from the object to the link. The minimum response is the self link. Please refere to the individual example and object definition (the allOf keyword which is only visibile in the YAMl code) to see all required links for the instance of the object."
        uri:
          x-required-boolean: true
          type: "string"
          format: "uri"
          description: "The URL to the ressource which is related"
      example:
        - "@type": "Link"
          rel: "self"
          uri: "https://partnerapi.deere.com/platform/machines/482754/breadcrumbs"
        - "@type": "Link"
          rel: "nextPage"
          uri: "https://partnerapi.deere.com/platform/machines/482754/breadcrumbs;start=30;count=10"
        - "@type": "Link"
          rel: "nextPage"
          uri: "https://partnerapi.deere.com/platform/machines/482754/breadcrumbs;start=10;count=10"
    Point:
      description: "Point."
      type: "object"
      required:
        - "@type"
        - "lat"
        - "lon"
      properties:
        "@type":
          description: "Object type"
          type: "string"
          default: "Point"
          example: "Point"
        lat:
          description: "Latitude in range of -90 to +90"
          type: "number"
          format: "float"
          example: 7.801324
        lon:
          description: "longitude in range of -180 to +180"
          type: "number"
          format: "float"
          example: 49.456166
        altitude:
          $ref: "#/components/schemas/MeasurementAsDouble"
    ReportedLocation:
      properties:
        point:
          description: "Contains the &lt;lat&gt;, &lt;lon&gt;, and &lt;altitude&gt; tags."
          type: "N/A"
          example: "N/A"
        lat:
          type: "double"
          example: "41.688612"
          description: "The latitude of the machine's location."
          format: "float"
        lon:
          type: "double"
          description: "The longitude of the machine's location."
          example: "-93.693612"
          format: "float"
        altitude:
          type: "measurement AsDouble"
          description: "The altitude of the machine's location. The value and unit of measurement are both included."
          example: "See sample response below."
          default: "ReportedLocation"
        eventTimestamp:
          type: "string"
          format: "date"
          example: "2012-11-07T18:42:07.186Z"
          description: "Timestamp of the machine location report. All timestamps follow the standard format."
        gpsFixTimestamp:
          type: "string"
          format: "date"
          description: "The last time the machine noted its GPS location."
          example: "2010-10-04T15:06:24.000Z"
  securitySchemes:
    OAuth2:
      type: "oauth2"
      flows:
        clientCredentials:
          scopes:
            eq1: "eq1"
x-source-documents:
  - endPointName: "location-history"
    id: 23
  - endPointName: "breadcrumbs"
    id: 24
