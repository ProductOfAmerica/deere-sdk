  parameters:
    OrganizationId:
      in: "path"
      name: "orgId"
      description: "Organization ID"
      required: true
      schema:
        type: "string"
        example: 1234
        format: "uuid"
        default: "N/A"
    embed:
      name: "embed"
      in: "query"
      description: "Takes these values mapLayers."
      required: false
      schema:
        type: "string"
        example: "mapLayers"
        format: "uuid"
        default: "N/A"
    fieldId:
      name: "fieldId"
      in: "path"
      description: "Field ID"
      required: true
      schema:
        type: "GUID"
        example: "d01111d6-1fa4-4659-943a-3df4a6b7933c"
        format: "uuid"
        default: "N/A"
    fileId:
      in: "path"
      name: "fileId"
      description: "Field ID"
      required: true
      schema:
        type: "GUID"
        example: "d01111d6-1fa4-4659-943a-3df4a6b7933c"
        format: "int64"
        default: "N/A"
    fileId_FileResources:
      in: "path"
      name: "id"
      description: "File Resource ID"
      required: true
      schema:
        type: "string"
        example: "83ks9gh3-29fj-9302-837j-92jlsk92jd095kd"
        format: "uuid"
        default: "N/A"
    getId:
      in: "path"
      name: "id"
      description: "Map Layer ID"
      required: true
      schema:
        type: "string"
        example: "83ks9gh3-29fj-9302-837j-92jlsk92jd095kd"
        format: "uuid"
        default: "N/A"
    getMapId:
      in: "path"
      name: "id"
      description: "Map Layer ID"
      required: true
      schema:
        type: "string"
        example: "83ks9gh3-29fj-9302-837j-92jlsk92jd095kd"
        format: "uuid"
        default: "N/A"
    id:
      name: "id"
      in: "path"
      description: "Map Layer Summary ID"
      required: true
      schema:
        type: "string"
        example: "y02111d6-1fa4-4659-943a-3df4a6b7933c"
        format: "uuid"
        default: "N/A"
    id_FileResources:
      in: "path"
      name: "id"
      description: "Map Layer ID"
      required: true
      schema:
        type: "string"
        example: "d01111d6-1fa4-4659-943a-3df4a6b7933c"
        format: "uuid"
        default: "N/A"
    id_MapLayers:
      in: "path"
