openapi: "3.0.1"
info:
  title: "Contributed Map Layers API"
  description: "A collection of APIs used for interacting with Contributed Map Layers in MJD."
  version: "0.0.1"
servers:
  - url: "https://{environment}.deere.com/platform"
    variables:
      environment:
        default: "api"
        enum:
          - "api"
          - "apicert"
          - "apiqa.tal"
          - "sandboxapi"
          - "partnerapi"
paths:
  /fileResources/{id}:
    get:
      description: "This resource allows the client to view or download a File Resource.<br/>To view a File Resource's metadata, set the application/vnd.deere.axiom.v3+json Accept Header. To download the File Resource itself, choose a zip or octet-stream Accept Header."
      summary: "View/Download a File Resource"
      parameters:
        - $ref: "#/components/parameters/fileId_FileResources"
      security:
        - OAuth2:
            - "ag1"
      responses:
        "200":
          $ref: "#/components/schemas/GetFileResponseDetails"
      contentType:
        description: "The request body used to create or update a client"
        content:
          application/vnd.deere.axiom.v3+json:
            schema:
              properties:
                No Header: "<b>List of valid Accept headers</b><ul> <li>application/zip</li> <li>application/octet-stream</li> <li>application/x-zip</li> <li>application/x-zip-compressed</li> <li>application/vnd.deere.axiom.v3+json</li></ul>"
    put:
      description: "Uploads a binary File Resource for a given Map Layer. The client must first create a File Resource ID by calling <b>POST /mapLayers/{id}/fileResources</b> API before uploading. Check the status of the upload by requesting the File Resource's <mark>targetResource</mark> Link."
      summary: "Upload a File Resource"
      parameters:
        - $ref: "#/components/parameters/fileId_FileResources"
      security:
        - OAuth2:
            - "ag3"
      responses:
        "200":
          description: "Created"
          content:
            application/vnd.deere.axiom.v3+json:
              schema:
                properties:
                  total:
                    type: "integer"
                    example: 1
                    format: "int32"
              examples:
                Headers:
                  description: "204 No Content"
      contentType:
        description: "The request body used to create or update a client"
        content:
          application/vnd.deere.axiom.v3+json:
            schema:
              properties:
                No Header: "<b>List of valid Content-Type headers</b><ul><li>application/zip</li><li>application/octet-stream</li><li>application/x-zip</li><li>application/x-zip-compressed</li></ul>"
    delete:
      description: "Deletes a file resource."
      summary: "Delete a File Resource"
      security:
        - OAuth2:
            - "ag3"
      parameters:
        - $ref: "#/components/parameters/fileId_FileResources"
      responses:
        "200":
          description: "Created"
          content:
            application/vnd.deere.axiom.v3+json:
              schema:
                properties:
                  total:
                    type: "integer"
                    example: 1
                    format: "int32"
              examples:
                Headers:
                  description: "204 No Content"
  /mapLayerSummaries/{id}:
    get:
      description: "Returns a specific Map Layer Summary resource."
      summary: "View a Map Layer Summary"
      parameters:
        - $ref: "#/components/parameters/id"
      security:
        - OAuth2:
            - "ag2"
      responses:
        "200":
          description: "View a specific Map Layer Summary"
          content:
            application/vnd.deere.axiom.v3+json:
              schema:
                properties:
                  values:
                    items:
                      $ref: "#/components/schemas/PostContributedMapLayerSummary"
                  links:
                    items:
                      $ref: "#/components/schemas/GetMapLayerSummaryAvailableLinks"
              examples:
                No Header:
                  description: "200 OK <br/>Content-Type: application/vnd.deere.axiom.v3+json"
                  value:
                    links:
                      - rel: "self"
                        uri: "https://sandboxapi.deere.com/platform/mapLayerSummaries/MAP_LAYER_SUMMARY_ID"
                      - rel: "owningOrganization"
                        uri: "https://sandboxapi.deere.com/platform/organizations/ORD_ID"
                      - rel: "targetResource"
                        uri: "https://sandboxapi.deere.com/platform/organizations/ORG_ID/fields/FIELD_ID"
                      - rel: "mapLayers"
                        uri: "https://sandboxapi.deere.com/platform/mapLayerSummaries/MAP_LAYER_SUMMARY_ID/mapLayers"
                      - rel: "createMapLayer"
                        uri: "https://sandboxapi.deere.com/platform/mapLayerSummaries/MAP_LAYER_SUMMARY_ID/mapLayers"
                    id: "MAP_LAYER_SUMMARY_ID"
                    title: "some title"
                    text: "description of the map layers"
                    mapType: "PRESCRIPTION"
                    metadata:
                      - name: "The Name"
                        value: "The Value"
                    dateCreated: "2016-01-02T16:14:23.421Z"
                    lastModifiedDate: "2016-01-02T16:14:23.421Z"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "406":
          $ref: "#/components/responses/406"
        "429":
          $ref: "#/components/responses/429"
    delete:
      description: "Deletes a Map Layer Summary and its underlying Map Layer and File Resource resources."
      summary: "Delete a Map Layer Summary"
      parameters:
        - $ref: "#/components/parameters/id"
      security:
        - OAuth2:
            - "ag3"
      responses:
        "200":
          description: "Deleted"
          content:
            application/vnd.deere.axiom.v3+json:
              schema:
                properties:
                  total:
                    type: "integer"
                    example: 1
                    format: "int32"
              examples:
                Headers:
                  description: "204 No Content"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "406":
          $ref: "#/components/responses/406"
        "429":
          $ref: "#/components/responses/429"
  /mapLayerSummaries/{id}/mapLayers:
    get:
      description: "This resource lists all Map Layers for a specific Map Layer Summary. <br/><b>Note:</b> This API does not support eTags."
      summary: "List Map Layers"
      parameters:
        - $ref: "#/components/parameters/id_MapLayers"
        - $ref: "#/components/parameters/includePartialLayers"
      responses:
        "200":
          $ref: "#/components/schemas/MapLayerCollection_MapLayers"
      security:
        - OAuth2:
            - "ag1"
    post:
      description: "Creates a new Map Layer resource."
      summary: "Create a Map Layer"
      parameters:
        - $ref: "#/components/parameters/id_MapLayers"
      security:
        - OAuth2:
            - "ag3"
      requestBody:
        content:
          application/vnd.deere.axiom.v3+json:
            schema:
              $ref: "#/components/schemas/PostResponse_MapLayers"
          Create Map Layer:
            examples:
              No Header:
                description: ""
                value:
                  title: "The title on the Map Layer"
                  text: "NDVI Layer for mid-season plant health based on near infrared ([NIR](https://en.wikipedia.org/wiki/Infrared#Regions_within_the_infrared))"
                  metadata:
                    - name: "time"
                      value: "Friday, June 29, 2018 (CDT)"
                    - name: "elevation"
                      value: "35ft"
                  extent:
                    minimumLatitude: 41.76073
                    maximumLatitude: 41.771366
                    minimumLongitude: -93.488106
                    maximumLongitude: -93.4837
                  sortName: "02"
                  legends:
                    unitId: "seeds1ha-1"
                    ranges:
                      - label: "Other - Upper Bound"
                        minimum: 87500
                        maximum: 262500
                        hexColor: "#a6cee3"
                        percent: 2.11
                      - label: "High"
                        minimum: 87300
                        maximum: 87500
                        hexColor: "#1f78b4"
                        percent: 18.02
                      - label: "Medium"
                        minimum: 87100
                        maximum: 87300
                        hexColor: "#b2df8a"
                        percent: 49.74
                      - label: "Low"
                        minimum: 87100
                        maximum: 87300
                        hexColor: "#b2df8a"
                        percent: 49.74
                      - label: "Other - Lower Bound"
                        minimum: 0
                        maximum: 87000
                        hexColor: "#fb9a99"
                        percent: 3.13
      contentType:
        description: "The request body used to create or update a client"
        content:
          application/vnd.deere.axiom.v3+json:
            schema:
              properties:
                Content-Type: "application/vnd.deere.axiom.v3+json"
      responses:
        "200":
          description: "Created"
          content:
            application/vnd.deere.axiom.v3+json:
              schema:
                properties:
                  total:
                    description: "Number of results in the list"
                    type: "integer"
                    format: "int32"
                    example: 761
              examples:
                No Header:
                  description: "201 CREATED <br/>Location: https://sandboxapi.deere.com/platform/mapLayers/MAP_LAYER_ID"
  /mapLayers/{id}:
    get:
      description: "Returns a specific Map Layer resource."
      summary: "View a Map Layer"
      parameters:
        - $ref: "#/components/parameters/getId"
      security:
        - OAuth2:
            - "ag1"
      responses:
        "200":
          description: "Created"
          content:
            application/vnd.deere.axiom.v3+json:
              schema:
                properties:
                  values:
                    items:
                      $ref: "#/components/schemas/GetResponseDetails"
                  links:
                    items:
                      $ref: "#/components/schemas/GetAvailableLinks"
              examples:
                No Header:
                  description: "200 OK <br/>Content-Type: application/vnd.deere.axiom.v3+json"
                  value:
                    "@type": "ContributedMapLayer"
                    title: "The title on the Map Layer"
                    extent:
                      "@type": "MapExtent"
                      minimumLatitude: 41.76073
                      maximumLatitude: 41.771366
                      minimumLongitude: -93.488106
                      maximumLongitude: -93.4837
                    sortName: "02"
                    legends:
                      "@type": "MapLegend"
                      unitId: "seeds1ha-1"
                      ranges:
                        - "@type": "MapLegendItem"
                          label: "Some Label"
                          minimum: 87300
                          maximum: 87300
                          hexColor: "#0BA74A"
                          percent: 0.13
                    status: "QUEUED"
                    id: "MAP_LAYER_ID"
                    links:
                      - "@type": "Link"
                        rel: "owningOrganization"
                        uri: "https://sandboxapi.deere.com/platform/organizations/ORG_ID"
                      - "@type": "Link"
                        rel: "image"
                        uri: "https://sandboxapi.deere.com/platform/mapLayers/MAP_LAYER_ID/image"
                      - "@type": "Link"
                        rel: "self"
                        uri: "https://sandboxapi.deere.com/platform/mapLayers/MAP_LAYER_ID"
                      - "@type": "Link"
                        rel: "mapLayerSummary"
                        uri: "https://sandboxapi.deere.com/platform/mapLayerSummaries/MAP_LAYER_SUMMARY_ID"
                      - "@type": "Link"
                        rel: "fileResources"
                        uri: "https://sandboxapi.deere.com/platform/mapLayers/MAP_LAYER_ID/fileResources"
                      - "@type": "Link"
                        rel: "createFileResource"
                        uri: "https://sandboxapi.deere.com/platform/mapLayers/MAP_LAYER_ID/fileResources"
    delete:
      description: "Deletes a Map Layer and its underlying File Resource."
      summary: "Delete a Map Layer"
      security:
        - OAuth2:
            - "ag3"
      parameters:
        - $ref: "#/components/parameters/getMapId"
      responses:
        "200":
          description: "Deleted"
          content:
            application/vnd.deere.axiom.v3+json:
              schema:
                properties:
                  total:
                    type: "integer"
                    example: 1
                    format: "int32"
              examples:
                Headers:
                  description: "204 No Content"
  /mapLayers/{id}/fileResources:
    get:
      description: "This resource will return the File Resource associated to the specified Map Layer. <br/><b>Note:</b> This API does not support eTags."
      summary: "Get a Map Layer File Resource"
      parameters:
        - $ref: "#/components/parameters/id_FileResources"
      security:
        - OAuth2:
            - "ag1"
      responses:
        "200":
          $ref: "#/components/schemas/GetFileResponse"
    post:
      description: "This resource will create a new File Resource for a Map Layer."
      summary: "Create a Map Layer File Resource"
      security:
        - OAuth2:
            - "ag3"
      parameters:
        - $ref: "#/components/parameters/id_FileResources"
      requestBody:
        content:
          application/vnd.deere.axiom.v3+json:
            schema:
              $ref: "#/components/schemas/RequestDetails"
          Create a new File Resource:
            examples:
              No Header:
                description: ""
                value:
                  links:
                    - rel: "owningOrganization"
                      uri: "https://sandboxapi.deere.com/platform/organizations/ORG_ID"
                  mimeType: "image/png"
                  metadata:
                    - name: "filename"
                      value: "mapLayerImage.png"
                  timestamp: "2019-01-02T16:14:23.421Z"
      contentType:
        description: "The request body used to create or update a client"
        content:
          application/vnd.deere.axiom.v3+json:
            schema:
              properties:
                Content-Type: "application/vnd.deere.axiom.v3+json"
      responses:
        "200":
          $ref: "#/components/schemas/PostFileResponse"
  /mapLayers/{mapLayerId}:
    get:
      description: "Returns the image file associated with the Map Layer resource."
      summary: "Extract Map Layer Image"
      security:
        - OAuth2:
            - "ag1"
      parameters:
        - $ref: "#/components/parameters/getMapId"
      responses:
        "200":
          description: "Created"
          content:
            image/png OR application/octet-stream:
              examples:
                Headers:
                  description: "The binary contents of the Map Layer are returned in PNG format."
  /organizations/{orgId}/fields/{id}/mapLayerSummaries:
    get:
      description: "This resource will list all Map Layer Summaries for a specified field.<br/>"
      note: "<b>Note</b>: This API does not support eTags."
      summary: "List Map Layer Summaries"
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/fieldId"
        - $ref: "#/components/parameters/includePartialSummaries"
        - $ref: "#/components/parameters/embed"
      security:
        - OAuth2:
            - "ag2"
      responses:
        "200":
          $ref: "#/components/schemas/MapLayerSummaryCollection"
    post:
      description: "Creates a new Map Layer Summary resource."
      summary: "Create a map layer summary"
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/fieldId"
      security:
        - OAuth2:
            - "ag3"
      requestBody:
        content:
          application/vnd.deere.axiom.v3+json:
            schema:
              $ref: "#/components/schemas/PostRequest"
          Create Map Layer Summary:
            examples:
              No Header:
                description: ""
                value:
                  links:
                    - rel: "owningOrganization"
                      uri: "https://sandboxapi.deere.com/platform/organizations/ORG_ID"
                  title: "some title"
                  text: "description of map layer summary with [a link](https://www.example.com)"
                  metadata:
                    - name: "The Name"
                      value: "The Value"
                  dateCreated: "2016-01-02T16:14:23.421Z"
      contentType:
        description: "The request body used to create or update a client"
        content:
          application/vnd.deere.axiom.v3+json:
            schema:
              properties:
                Content-Type: "application/vnd.deere.axiom.v3+json"
      responses:
        "200":
          description: "Created"
          content:
            application/vnd.deere.axiom.v3+json:
              examples:
                No Header:
                  description: "201 CREATED <br/>Location: https://sandboxapi.deere.com/platform/mapLayerSummaries/MAP_LAYER_SUMMARY_ID"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "406":
          $ref: "#/components/responses/406"
        "415":
          $ref: "#/components/responses/415"
        "429":
          $ref: "#/components/responses/429"
components:
  examples:
    400Errors:
      description: "{

        \  \"@type\": \"Errors\",

        \  \"errors\": [

        \    {

        \      \"@type\": \"Error\",

        \      \"guid\": \"53697217-9e70-492b-be04-179e253c3116\",

        \      \"message\": \"Owning Organization Link is missing and is required.\",

        \      \"code\": \"validation_constraint_owning_org_link_missing\",

        \      \"field\": \"owningOrganization\"

        \    },

        \    {

        \      \"@type\": \"Error\",

        \      \"guid\": \"39dc10f0-6e2c-4517-bfd6-713a7c4da768\",

        \      \"message\": \"Contribution Definition Link is missing and is required.\",

        \      \"code\": \"validation_constraint_contribution_definition_link_missing\",

        \      \"field\": \"contributionDefinition\"

