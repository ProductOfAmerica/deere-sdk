  /varieties/{erid}/associateToOrg/{organizationId}:
    post:
      tags:
        - "Reference Varieties"
      summary: "Adds a single reference variety to organization"
      security:
        - OAuth2:
            - "eq2"
      description: "This endpoint will associate a reference variety to your organization from the global reference list.

        The reference varieties are immutable, however, they can still be archived or made available.

        The response headers from the GET endpoints will include the attributes that can be overridden.\n"
      parameters:
        - $ref: "#/components/parameters/ERID"
        - $ref: "#/components/parameters/OrganizationID"
      requestBody:
        description: "The product to add."
        content:
          application/vnd.deere.axiom.v3+json:
            schema:
              $ref: "#/components/schemas/ReferenceProductPointerRequest"
            examples:
              No Header:
                value:
                  countryCode: "USA"
                  overrides:
                    - key: "archived"
                      value: true
      responses:
        "200":
          description: "Successful association of reference variety to org."
          content:
            application/vnd.deere.axiom.v3+json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/ReferenceProductOverrideStatus"
              examples:
                Headers:
                  description: "201 Created <br/>Created successfully."
                  value:
                    - key: "archived"
                      success: true
                      errors: []
        "400":
          description: "Unresolvable name conflict or other error occurred."
          content:
            application/json:
              schema:
                properties:
                  total:
                    type: "integer"
                    format: "int64"
                    example: 1
                  errors:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/Errors"
        "403":
          description: "Invalid access to products for organization"
        "404":
          description: "Organization does not exist."
        "409":
          description: "A product already exists in this org with the specified erid."
      contentType:
        description: "The request body used to create or update a client"
        content:
          application/vnd.deere.axiom.v3+json:
            schema:
              properties:
                Content-Type: "application/vnd.deere.axiom.v3+json"
