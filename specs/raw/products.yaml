  /chemicals/{erid}/associateToOrg/{organizationId}:
    post:
      tags:
        - "Reference Chemicals"
      summary: "Adds a single reference chemical to organization"
      security:
        - OAuth2:
            - "eq2"
      description: "This endpoint will associate a reference chemical to your organization from the global reference list.

        The reference chemicals are immutable, however, they can still be archived or made available.

        If a reference chemical is created as a carrier, it cannot be changed thereafter.

        The registration of a reference chemical can also be updated.

        The response headers from the GET endpoints will include the attributes that can be overridden.\n"
      parameters:
        - $ref: "#/components/parameters/ERID"
        - $ref: "#/components/parameters/OrganizationID"
      requestBody:
        description: "The product to add."
        content:
          application/vnd.deere.axiom.v3+json:
            schema:
              $ref: "#/components/schemas/PostReferenceChemical"
            examples:
              No Header:
                value:
                  countryCode: "USA"
                  overrides:
                    - key: "archived"
                      value: true
                    - key: "registration"
                      value: "EXEMPT"
                    - key: "isCarrier"
                      value: true
      responses:
        "200":
          description: "Successful association of reference chemical to org."
          content:
            application/vnd.deere.axiom.v3+json:
              schema:
                $ref: "#/components/responses/Created"
              examples:
                Headers:
                  description: "201 Created"
                  value:
                    - key: "archived"
                      success: true
                      errors: []
                    - key: "isCarrier"
                      success: true
                      errors: []
                    - key: "registration"
                      success: true
                      errors: []
        "400":
          description: "Unresolvable name conflict or other error occurred."
          content:
            application/json:
              schema:
                properties:
                  total:
                    type: "integer"
                    format: "int64"
                    example: 1
                  errors:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/Errors"
        "403":
          description: "Invalid access to products for organization"
        "404":
          description: "Organization does not exist"
      contentType:
        description: "The request body used to create or update a client"
        content:
          application/vnd.deere.axiom.v3+json:
            schema:
              properties:
                Content-Type: "application/vnd.deere.axiom.v3+json"
  /chemicals/{erid}/documents:
    get:
