  /chemicals/{erid}:
    get:
      tags:
        - "Reference Chemicals"
      summary: "Get a single reference chemical"
      description: "Single chemical from industry data sources, such as CDMS."
      security:
        - OAuth2:
            - "eq1"
      parameters:
        - $ref: "#/components/parameters/ERID"
      responses:
        "200":
          description: "A single chemical matching the specified erid."
          content:
            application/vnd.deere.axiom.v3+json:
              schema:
                $ref: "#/components/schemas/ReferenceChemical"
              examples:
                No Header:
                  value:
