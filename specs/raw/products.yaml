openapi: "3.0.0"
info:
  title: "Inputs API"
  description: "Provides a reference list for crop varieties"
  version: "3.0"
  license:
    name: "INPUTS"
tags:
  - name: "Reference Data"
  - name: "Products"
    description: "Chemical/Fertilizer and Variety master data for an organization"
  - name: "Tank Mixes"
    description: "Tank Mix master data for an organization"
  - name: "Active Ingredients"
servers:
  - url: "https://{environment}.deere.com/platform"
    variables:
      environment:
        default: "api"
        enum:
          - "partnerapi"
          - "sandboxapi"
          - "api"
          - "apicert"
          - "apiqa.tal"
          - "apidev.tal"
paths:
  /activeIngredients:
    get:
      tags:
        - "Active Ingredients"
      summary: "List of available active ingredients"
      security:
        - OAuth2:
            - "eq1"
      description: "Returns a list of all available active ingredients."
      parameters:
        - $ref: "#/components/parameters/EntityTypeQueryParam"
      responses:
        "200":
          description: "List of available active ingredients."
          content:
            application/vnd.deere.axiom.v3+json:
              schema:
                $ref: "#/components/schemas/ActiveIngredientsCollection"
              examples:
                No Header:
                  value:
                    links:
                      - "@type": "Link"
                        rel: "self"
                        uri: "https://sandboxapi.deere.com/isg/activeIngredients"
                    total: 4
                    values:
                      - "@type": "ActiveIngredient"
                        id: "30ca101c-e78f-4e45-a248-1ce9622c7f10"
                        name: "Urea Nitrogen"
                      - "@type": "ActiveIngredient"
                        id: "e022ec44-43de-43ab-92e2-2c60da7762b9"
                        name: "1-aminocyclopropanecarboxylic acid"
                      - "@type": "ActiveIngredient"
                        id: "fa79f870-7aa1-48e7-9d1e-4cf98d68ca57"
                        name: "1-aminocyclopropanecarboxylic acid (ACC)"
                      - "@type": "ActiveIngredient"
                        id: "962bd78a-0029-4c6a-b2dd-2efab3f53285"
                        name: "1-Methylcyclopropene"
        "401":
          description: "The user does not have access to the list of active ingredients."
  /chemicals:
    get:
      tags:
        - "Reference Chemicals"
      summary: "Reference list of all known chemicals"
      security:
        - OAuth2:
            - "eq1"
      description: "List of all chemicals from industry data sources, such as CDMS."
      note: "<b>Note</b>: Either searchString, productName, or brandName is required as a parameter in the query to get returned results. If searchString AND productName and/or brandName is added to the query, searchString will be ignored. When using searchString, results will contain items with search value from name or companyName. When using productName, value must be exact match to companyName string. When using brandName, value must be exact match to companyName string, and is case sensitive. All results will be limited to 100 values."
      parameters:
        - name: "searchString"
          in: "query"
          description: "performs a fuzzy search on product name, manufacturer, and chemical type. The search string must be at least 3 characters long."
          schema:
            type: "string"
            example: "Roundup"
          required: true
        - name: "chemicalType"
          in: "query"
          description: "Specifies the registration number of the chemical based on the country or region/state of use."
          schema:
            type: "string"
            enum:
              - "ADDITIVE"
              - "ADJUVANT"
              - "DEFOLIANT"
              - "FUNGICIDE"
              - "GROWTH_REGULATOR"
              - "HERBICIDE"
              - "INSECTICIDE"
              - "NITROGEN_STABILIZER"
            example: "INSECTICIDE"
        - name: "productName"
          in: "query"
          description: "Specifies the name of the chemical in the global reference list."
          schema:
            type: "string"
            example: "RoundUp"
          required: true
        - name: "brandName"
          in: "query"
          description: "Specifies the product manufacturer name of the chemical based on the region being used."
          schema:
            type: "string"
            example: "MONSANTO AGRICULTURAL CO"
          required: true
        - name: "registration"
          in: "query"
          description: "Specifies the registration number of the chemical based on the region of use."
          schema:
            type: "string"
            example: "89167-72-89391"
        - name: "sourceSystemProductId"
          in: "query"
          description: "Specifies the source system product id of the chemical based on the country of use."
          schema:
            type: "string"
            example: "905P24930"
        - name: "countryCode"
          in: "query"
          description: "Specifies the region the chemical data belongs to. Some data may not be available in certain regions and data will not be included in the response."
          schema:
            type: "string"
            example: "USA"
      responses:
        "200":
          description: "A collection of products matching the specified search criteria."
          content:
            application/vnd.deere.axiom.v3+json:
              schema:
                $ref: "#/components/schemas/ReferenceChemicalCollection"
              examples:
                No Header:
                  value:
                    links:
                      - "@type": "Link"
                        rel: "self"
                        uri: "https://sandboxapi.deere.com/platform/chemicals?searchString=round&itemLimit=10&pageOffset=0"
                      - "@type": "Link"
                        rel: "nextPage"
                        uri: "https://sandboxapi.deere.com/platform/chemicals?searchString=round&itemLimit=10&pageOffset=10"
                    total: 100
                    values:
                      - "@type": "ReferenceChemical"
                        id: "8fb34898-64f5-5a1e-a698-34ab348220a7"
                        name: "Round Up"
                        companyName: "Monsanto"
                        registration: "a12e9i84"
                        materialClassification: "LIQUID"
                        category: "CHEMICAL"
                        epaRegistration: "a12e9i84"
                        referenceId: "8fb34898-64f5-5a1e-a698-34ab348220a7"
                        createdTime: "2017-03-21T21:12:53.865Z"
                        modifiedTime: "2018-04-06T15:12:52.910Z"
                        countryCode: "USA"
                        type: "HERBICIDE"
