    post:
      tags:
        - "Fertilizer"
      summary: "Add fertilizer"
      description: "This endpoint will add a custom fertilizer into the organization. Its name+type must be unique within your organization, unless carrier is set to true. If carrier is set to true, then type is disregarded. A fertilizer's carrier property cannot be changed to false once set to true. A fertilizer cannot be archived if it is in an active tank mix or dry blend. If a fertilizer is marked as archived and is used in a tank mix/dry blend, if the tank mix/dry blend is made available, then this fertilizer will also be made available. If passing in a liquid weight or weight unit, material classification should be set to LIQUID.</br> </br> Additionally, POST can be used for supporting offline creation of fertilizers from e.g. a mobile app, by sending a payload  with an `id` generated by the client. If an `id` is present in the payload, the service checks the database for that `id`. </br> </br> In case no record is found, a new one is created with that `id` and the request is responded with 201. </br> Otherwise no creation happens and the request is responded with 409 and error message that a resource with that `id` already exists."
      security:
        - OAuth2:
            - "eq2"
      parameters:
        - $ref: "#/components/parameters/OrganizationID"
      requestBody:
        description: "The product to add. If an ERID is specified in the request, it should exist as part of the reference data set (/fertilizers); this ERID will be unique only within the context of an organization. If the ERID is omitted, a uuid will be assigned; in this case, the item will be considered a custom product, and there will be no association to any reference product. Using the reference Erid when adding a product will help to maintain a common parentage of products across organizations."
        content:
          application/vnd.deere.axiom.v3+json:
            schema:
              $ref: "#/components/schemas/PostFertilizer"
            examples:
              No Header:
                value:
                  "@type": "Fertilizer"
                  name: "Tide Propiconazole 41.8EC"
                  companyName: "Tide International USA, Inc."
                  type: "MANURE"
                  materialClassification: "DRY"
                  registration: "a12e9i84"
                  restrictedUse: false
                  category: "FERTILIZER"
                  carrier: false
                  archived: false
                  liquidWeight: 3.14
                  weightUnit: "lb/gal"
                  activeIngredients:
                    - name: "Urea Nitrogen"
                      guid: "9ab0fd0d-7ed0-49bd-9a61-0277d89b61f4"
                      percent: 3.14
                      unit: "%"
                      value: 3.14
                  epaRegistration: "a12e9i84"
                  createdTime: "2017-03-21T21:12:53.865Z"
                  modifiedTime: "2018-04-06T15:12:52.910Z"
      responses:
        "201":
          content:
            application/vnd.deere.axiom.v3+json:
              schema:
                $ref: "#/components/responses/Created"
              examples:
                Headers:
                  description: "201 Created<br/>Location: https://sandboxapi.deere.com/platform/organizations/123456/fertilizers/c0dcb00a-6b6f-4508-9180-679addad23f8"
