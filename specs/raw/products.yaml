  /chemicals/{erid}/setOverridesForOrg/{organizationId}:
    patch:
      tags:
        - "Reference Chemicals"
      security:
        - OAuth2:
            - "eq2"
      summary: "Sets organizational attributes such as isCarrier, archived, registration, etc"
      description: "This endpoint will set attribute overrides while importing a reference chemical to your organization. The reference chemicals are immutable, however, they can still be archived or made available. Once set to true, the carrier attribute cannot be set to false. The registration of a reference chemical can be updated. The response headers from the GET endpoints will include the attributes that can be overridden."
      parameters:
        - $ref: "#/components/parameters/ERID"
        - $ref: "#/components/parameters/OrganizationID"
      requestBody:
        description: "The product to add."
        content:
          application/vnd.deere.axiom.v3+json:
            schema:
              $ref: "#/components/schemas/CommonReferenceChemical"
            examples:
              No Header:
                value:
                  overrides:
                    - key: "archived"
                      value: true
                    - key: "registration"
                      value: "EXEMPT"
                    - key: "isCarrier"
                      value: true
      responses:
        "200":
          description: "Successful update of overrides of reference chemical associated to your org."
          content:
            application/vnd.deere.axiom.v3+json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/ReferenceProductOverrideStatus_Chemicals"
              examples:
                Headers:
                  description: "200 Created"
                  value:
                    - key: "archived"
                      success: true
                      errors: []
                    - key: "isCarrier"
                      success: true
                      errors: []
                    - key: "registration"
                      success: true
                      errors: []
        "400":
          description: "Unresolvable name conflict or other error occurred."
          content:
            application/json:
              schema:
                properties:
                  total:
                    type: "integer"
                    format: "int64"
                    example: 1
                  errors:
                    type: "array"
                    items:
                      $ref: "#/components/schemas/Errors"
        "403":
          description: "Invalid access to reference product associated to organization"
        "404":
          description: "Organization does not exist"
      contentType:
        description: "The request body used to create or update a client"
        content:
          application/vnd.deere.axiom.v3+json:
            schema:
              properties:
                Content-Type: "application/vnd.deere.axiom.v3+json"
