name: API Health Check

on:
  schedule:
    # Run daily at 5 AM UTC (staggered from sync-api at 6 AM)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  check-apis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check API availability
        id: check
        run: |
          npx tsx scripts/check-api-health.ts > health-report.json
          cat health-report.json

      - name: Update health badge
        run: |
          TOTAL=$(jq '.total' health-report.json)
          HEALTHY=$(jq '.healthy' health-report.json)

          if [ "$TOTAL" -eq "$HEALTHY" ]; then
            echo "STATUS=passing" >> $GITHUB_ENV
            echo "COLOR=brightgreen" >> $GITHUB_ENV
          elif [ "$HEALTHY" -gt 20 ]; then
            echo "STATUS=degraded" >> $GITHUB_ENV
            echo "COLOR=yellow" >> $GITHUB_ENV
          else
            echo "STATUS=failing" >> $GITHUB_ENV
            echo "COLOR=red" >> $GITHUB_ENV
          fi
          echo "LABEL=$HEALTHY/$TOTAL APIs" >> $GITHUB_ENV

      - name: Create health badge JSON
        run: |
          mkdir -p .github/badges
          echo '{
            "schemaVersion": 1,
            "label": "API Health",
            "message": "${{ env.LABEL }}",
            "color": "${{ env.COLOR }}"
          }' > .github/badges/api-health.json

      - name: Upload health artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: health-artifacts
          path: |
            .github/badges/api-health.json
            health-report.json
          retention-days: 1

  commit-health-status:
    needs: check-apis
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: health-artifacts
          path: .

      - name: Commit health status
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/badges/api-health.json health-report.json || true
          git diff --staged --quiet || git commit -m "chore: update API health status"
          git push || true
