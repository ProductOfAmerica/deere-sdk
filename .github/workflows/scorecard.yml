name: OpenSSF Scorecard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.nvmrc'
      - '.github/badges/**'
      - '.github/CODEOWNERS'
      - '.github/dependabot.yml'
  schedule:
    # Run weekly on Monday at 6:00 UTC
    - cron: '0 6 * * 1'

# Declare default permissions as read only
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest

    permissions:
      # Needed for Code Scanning upload
      security-events: write
      # Needed for GitHub OIDC token for publishing results
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to OpenSSF API (enables the badge)
          publish_results: true
          # Fine-grained PAT with Administration:read to read branch protection rules
          repo_token: ${{ secrets.SCORECARD_TOKEN }}

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: results.sarif
