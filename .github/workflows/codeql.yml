name: CodeQL

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.nvmrc'
      - '.github/badges/**'
      - '.github/CODEOWNERS'
      - '.github/dependabot.yml'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.nvmrc'
      - '.github/badges/**'
      - '.github/CODEOWNERS'
      - '.github/dependabot.yml'
      - '.github/workflows/**'
  schedule:
    # Run weekly on Monday at 7:00 UTC
    - cron: '0 7 * * 1'

permissions: read-all

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    permissions:
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: javascript-typescript
          queries: security-extended
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: "/language:javascript-typescript"
          output: sarif-results
          wait-for-processing: true

      - name: Dismiss SARIF-suppressed alerts
        if: github.ref == 'refs/heads/main'
        uses: advanced-security/dismiss-alerts@046d6b48d2e43cf563f96f67332c47c432eff83e # v2.0.2
        with:
          sarif-id: ${{ steps.analyze.outputs.sarif-id }}
          sarif-file: sarif-results/javascript-typescript.sarif
        env:
          GITHUB_TOKEN: ${{ github.token }}
