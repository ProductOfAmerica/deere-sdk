name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.nvmrc'
      - '.github/badges/**'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
      - '.nvmrc'
      - '.github/badges/**'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 23.x, 24.x, 25.x]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Run fuzz tests
        if: matrix.node-version == '24.x'
        run: pnpm test:fuzz

      - name: Run tests with coverage
        if: matrix.node-version == '24.x'
        run: |
          pnpm test:coverage 2>&1 | tee coverage-output.txt

          # Extract coverage percentage from output (line % is 2nd column after |)
          COVERAGE=$(grep "all files" coverage-output.txt | awk -F'|' '{print $2}' | tr -d ' ')
          echo "Coverage: $COVERAGE%"

          # Determine badge color
          if (( $(echo "$COVERAGE >= 90" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$COVERAGE >= 70" | bc -l) )); then
            COLOR="yellow"
          else
            COLOR="red"
          fi

          # Generate badge JSON
          mkdir -p .github/badges
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COVERAGE}%\",\"color\":\"${COLOR}\"}" > .github/badges/coverage.json

      - name: Upload coverage badge artifact
        if: matrix.node-version == '24.x' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-badge
          path: .github/badges/coverage.json
          retention-days: 1

  # STRICT: needs: build waits for ALL 6 matrix entries. If ANY Node version fails
  # (including flakes), the badge does NOT update that run. This is more correct
  # than the pre-split racy behavior — don't advertise a passing badge when a
  # matrix entry actually failed. Flaky CI is a separate problem to fix upstream.
  update-coverage-badge:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.PAT_WITH_BYPASS || github.token }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-badge
          path: .github/badges/
      - uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore: update coverage badge [skip ci]"
          file_pattern: ".github/badges/coverage.json"

  lint-workflows:
    runs-on: ubuntu-latest
    # NO job-level permissions block → inherits top-level contents: read.
    # Catches workflow YAML errors (bad `needs:`, undefined matrix refs, typos
    # in action names, permission syntax errors) pre-merge instead of at runtime.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install actionlint
        run: |
          curl -sSfL -o actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          tar xzf actionlint.tar.gz actionlint
          ./actionlint -version
      - name: Run actionlint
        # -shellcheck='' disables shellcheck integration. actionlint's native
        # rules still catch workflow YAML errors (bad needs/matrix/permissions/
        # action names) — which is what we want. Shellcheck's deep bash analysis
        # produces noise (info/style findings) on existing run: blocks that
        # aren't part of this PR's scope.
        run: ./actionlint -color -shellcheck=''
